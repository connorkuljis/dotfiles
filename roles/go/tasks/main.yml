---
- name: Check if Go toolchain is installed
  ansible.builtin.command:
    cmd: /usr/local/go/bin/go version
  register: go_check
  changed_when: false
  failed_when: false

# --- Legacy: stale distro package removal -------------------------------------
# These tools are now installed distro-independently via `go install` (see
# go_tools). They were once installed via the distro package manager
# (apt/dnf); /usr/bin/<tool> then shadows ~/<me>/go/bin/<tool> because
# /usr/bin precedes ~/go/bin on PATH. These blocks remove the stale distro
# copy so the Go-installed binary wins.
#
# LEGACY: safe to delete once all managed hosts have been reprovisioned past
# the distro versions (no /usr/bin/lazygit or /usr/bin/fzf remaining).
#
# lazygit
- name: Check for stale distro lazygit (legacy, removable)
  ansible.builtin.stat:
    path: /usr/bin/lazygit
  register: distro_lazygit_check

- name: Remove stale distro lazygit package (legacy, removable)
  ansible.builtin.package:
    name: lazygit
    state: absent
  when: distro_lazygit_check.stat.exists

# fzf -- Debian's apt package lags far behind upstream (e.g. 0.60 vs 0.73+).
- name: Check for stale distro fzf (legacy, removable)
  ansible.builtin.stat:
    path: /usr/bin/fzf
  register: distro_fzf_check

- name: Remove stale distro fzf package (legacy, removable)
  ansible.builtin.package:
    name: fzf
    state: absent
  when: distro_fzf_check.stat.exists
# --- End legacy --------------------------------------------------------------

- name: Install Go toolchain
  ansible.builtin.unarchive:
    src: "https://go.dev/dl/go{{ go_version }}.linux-amd64.tar.gz"
    dest: /usr/local
    remote_src: yes
  when: go_check.rc != 0
  become: true

# Canary: presence of the first go_tools binary implies the batch was run.
- name: Check if a representative Go tool is installed
  ansible.builtin.stat:
    path: "{{ lookup('env', 'HOME') }}/go/bin/lazygit"
  register: go_tools_check

- name: Install Go CLI tools
  ansible.builtin.shell:
    cmd: "export PATH=$PATH:/usr/local/go/bin:{{ lookup('env', 'HOME') }}/go/bin && go install {{ item }}"
    executable: /bin/bash
  loop: "{{ go_tools }}"
  when:
    - not go_tools_check.stat.exists or ((update_go_tools | default(false) | bool))
  become: false
