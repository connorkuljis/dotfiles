- name: Update apt cache
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 86400
  when: ansible_facts["os_family"] == "Debian"

- name: Ensure required packages are installed
  ansible.builtin.apt:
    name:
     - make
     - tmux
     - stow
     - rsync
     - curl
     - git
     - build-essential
     - fonts-font-awesome
     - fonts-noto-color-emoji
     - ncurses-term
     - jq
     - lazygit
    state: present
  when: ansible_facts["os_family"] == "Debian"

- name: Ensure stow directory exists
  ansible.builtin.file:
    path: "{{ lookup('env', 'HOME') }}/.local/share/stow"
    state: directory
  become: false

- name: Ensure local bin directory exists
  ansible.builtin.file:
    path: "{{ lookup('env', 'HOME') }}/.local/bin"
    state: directory
    mode: '0755'
  become: false

# Legacy cleanup: older playbook versions copied stow to /opt/dotfiles-stow
# (root-owned) and stowed from there. Remove the old copy and its parent so
# stale symlinks into it are the only thing left to relink (handled below by
# stow --restow from the new user-owned location).
- name: Remove legacy /opt/dotfiles-stow copy (legacy)
  ansible.builtin.file:
    path: /opt/dotfiles-stow
    state: absent
  become: true

- name: Copy stow directory (only changed files)
  ansible.builtin.synchronize:
    src: "{{ playbook_dir }}/stow/"
    dest: "{{ lookup('env', 'HOME') }}/.local/share/stow/"
    delete: yes
    recursive: yes
    times: yes
    checksum: yes
  become: false
  register: stow_sync

# Legacy cleanup: remove symlinks in $HOME still pointing at the old
# /opt/dotfiles-stow location so stow can relink them to the new
# ~/.local/share/stow source without "existing target is not owned by stow"
# conflicts. One-time migration.
- name: Find stale symlinks pointing at legacy /opt/dotfiles-stow (legacy)
  ansible.builtin.shell:
    cmd: >
      { find "{{ lookup('env', 'HOME') }}" -maxdepth 1 -type l -lname '*dotfiles-stow*';
        find "{{ lookup('env', 'HOME') }}/.config" -type l -lname '*dotfiles-stow*';
        find "{{ lookup('env', 'HOME') }}/.local/bin" -maxdepth 1 -type l -lname '*dotfiles-stow*'; } 2>/dev/null || true
    executable: /bin/bash
  register: legacy_stale_links
  changed_when: false
  become: false

- name: Remove stale legacy stow symlinks (legacy)
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop: "{{ legacy_stale_links.stdout_lines }}"
  become: false
  when: legacy_stale_links.stdout_lines | length > 0

- name: Stow all packages
  ansible.builtin.shell:
    cmd: |
      cd "{{ lookup('env', 'HOME') }}/.local/share/stow"
      for dir in */; do
        stow --verbose --restow --no-folding -t {{ lookup('env', 'HOME') }} "${dir%/}"
      done
  register: stow_result
  changed_when: "'LINK' in stow_result.stdout"
  become: false

- name: Check if cargo is installed
  ansible.builtin.stat:
    path: "{{ lookup('env', 'HOME') }}/.cargo/bin/cargo"
  register: cargo_check

- name: Install Rust via rustup
  ansible.builtin.shell:
    cmd: curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
  environment:
    PATH: "{{ lookup('env', 'PATH') }}:{{ lookup('env', 'HOME') }}/.cargo/bin"
  when: not cargo_check.stat.exists
  register: rustup_install
  become: false

- name: Check if cargo-binstall is installed
  ansible.builtin.stat:
    path: "{{ lookup('env', 'HOME') }}/.cargo/bin/cargo-binstall"
  register: cargo_binstall_check

- name: Install cargo-binstall
  ansible.builtin.shell:
    cmd: curl -L https://github.com/cargo-bins/cargo-binstall/releases/latest/download/cargo-binstall-x86_64-unknown-linux-gnu.tgz -o /tmp/cargo-binstall.tgz && tar -xzf /tmp/cargo-binstall.tgz -C ~/.cargo/bin/ && rm /tmp/cargo-binstall.tgz
  environment:
    PATH: "{{ lookup('env', 'PATH') }}:{{ lookup('env', 'HOME') }}/.cargo/bin"
  when: not cargo_binstall_check.stat.exists
  register: cargo_binstall_install
  become: false

- name: Check if ripgrep is installed
  ansible.builtin.stat:
    path: "{{ lookup('env', 'HOME') }}/.cargo/bin/rg"
  register: rg_check

- name: Install common Rust binaries via cargo-binstall
  ansible.builtin.command:
    cmd: cargo-binstall -y ripgrep fd-find bat eza zoxide yazi-fm starship bws
  environment:
    PATH: "{{ lookup('env', 'PATH') }}:{{ lookup('env', 'HOME') }}/.cargo/bin"
    CARGO_HOME: "{{ lookup('env', 'HOME') }}/.cargo"
  register: binstall_packages
  changed_when: "'Installing' in binstall_packages.stdout or 'downloaded' in binstall_packages.stdout"
  when:
    - cargo_binstall_check.stat.exists or cargo_binstall_install.changed
    - not rg_check.stat.exists or (update_rust_tools | default(false))

- name: Check if nvm is installed
  ansible.builtin.stat:
    path: "{{ lookup('env', 'HOME') }}/.nvm/nvm.sh"
  register: nvm_check

- name: Install nvm
  ansible.builtin.shell:
    cmd: curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.5/install.sh | bash
  environment:
    NVM_DIR: "{{ lookup('env', 'HOME') }}/.nvm"
    PROFILE: /dev/null
  when: not nvm_check.stat.exists
  register: nvm_install
  become: false

- name: Check if lazydocker is installed
  ansible.builtin.stat:
    path: "{{ lookup('env', 'HOME') }}/.local/bin/lazydocker"
  register: lazydocker_check

- name: Install lazydocker
  ansible.builtin.shell:
    cmd: curl https://raw.githubusercontent.com/jesseduffield/lazydocker/master/scripts/install_update_linux.sh | bash
  environment:
    DIR: "{{ lookup('env', 'HOME') }}/.local/bin"
  when: not lazydocker_check.stat.exists
  register: lazydocker_install
  become: false

- name: Check if nvim is installed
  ansible.builtin.stat:
    path: /opt/nvim-linux-x86_64/bin/nvim
  register: nvim_check

- name: Download Neovim archive
  ansible.builtin.get_url:
    url: https://github.com/neovim/neovim/releases/latest/download/nvim-linux-x86_64.tar.gz
    dest: /tmp/nvim-linux-x86_64.tar.gz
    mode: '0644'
  when: not nvim_check.stat.exists

- name: Remove existing nvim directory
  ansible.builtin.file:
    path: /opt/nvim-linux-x86_64
    state: absent
  when: not nvim_check.stat.exists
  become: true

- name: Extract Neovim archive
  ansible.builtin.unarchive:
    src: /tmp/nvim-linux-x86_64.tar.gz
    dest: /opt
    remote_src: yes
  when: not nvim_check.stat.exists
  become: true

- name: Clean up Neovim archive
  ansible.builtin.file:
    path: /tmp/nvim-linux-x86_64.tar.gz
    state: absent
  when: not nvim_check.stat.exists

- name: Create nvim symlink in /usr/local/bin
  ansible.builtin.file:
    src: /opt/nvim-linux-x86_64/bin/nvim
    dest: /usr/local/bin/nvim
    state: link
  become: true

