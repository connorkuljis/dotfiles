- name: Update apt cache
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600
  when: ansible_facts["os_family"] == "Debian"

- name: Ensure required packages are installed
  ansible.builtin.apt:
    name:
     - make
     - tmux
     - stow
     - rsync
     - build-essential
     - fonts-font-awesome
     - fonts-noto-color-emoji
     - ncurses-term
    state: present
  when: ansible_facts["os_family"] == "Debian"

- name: Ensure stow directory exists
  ansible.builtin.file:
    path: /opt/dotfiles-stow
    state: directory
    mode: '0775'

- name: Ensure local bin directory exists
  ansible.builtin.file:
    path: "{{ lookup('env', 'HOME') }}/.local/bin"
    state: directory
    mode: '0755'

- name: Copy stow directory (only changed files)
  ansible.builtin.synchronize:
    src: "{{ playbook_dir }}/stow/"
    dest: /opt/dotfiles-stow/
    delete: yes
    recursive: yes
    times: yes
    checksum: yes
  register: stow_sync

- name: Stow all packages
  ansible.builtin.shell:
    cmd: |
      cd /opt/dotfiles-stow
      for dir in */; do
        stow --verbose --restow -t {{ lookup('env', 'HOME') }} "${dir%/}"
      done
  register: stow_result
  changed_when: "'LINK' in stow_result.stdout"

- name: Check if cargo is installed
  ansible.builtin.stat:
    path: "{{ lookup('env', 'HOME') }}/.cargo/bin/cargo"
  register: cargo_check

- name: Install Rust via rustup
  ansible.builtin.shell:
    cmd: curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
  environment:
    PATH: "{{ lookup('env', 'PATH') }}:{{ lookup('env', 'HOME') }}/.cargo/bin"
  when: not cargo_check.stat.exists
  register: rustup_install

- name: Check if cargo-binstall is installed
  ansible.builtin.stat:
    path: "{{ lookup('env', 'HOME') }}/.cargo/bin/cargo-binstall"
  register: cargo_binstall_check

- name: Install cargo-binstall
  ansible.builtin.shell:
    cmd: curl -L https://github.com/cargo-bins/cargo-binstall/releases/latest/download/cargo-binstall-x86_64-unknown-linux-gnu.tgz -o /tmp/cargo-binstall.tgz && tar -xzf /tmp/cargo-binstall.tgz -C ~/.cargo/bin/ && rm /tmp/cargo-binstall.tgz
  environment:
    PATH: "{{ lookup('env', 'PATH') }}:{{ lookup('env', 'HOME') }}/.cargo/bin"
  when: not cargo_binstall_check.stat.exists
  register: cargo_binstall_install

- name: Install common Rust binaries via cargo-binstall
  ansible.builtin.command:
    cmd: cargo-binstall -y ripgrep fd-find bat eza zoxide yazi-fm starship
  environment:
    PATH: "{{ lookup('env', 'PATH') }}:{{ lookup('env', 'HOME') }}/.cargo/bin"
    CARGO_HOME: "{{ lookup('env', 'HOME') }}/.cargo"
  register: binstall_packages
  changed_when: "'Installing' in binstall_packages.stdout or 'downloaded' in binstall_packages.stdout"
  when: cargo_binstall_check.stat.exists

- name: Check if nvim is installed
  ansible.builtin.stat:
    path: /opt/nvim-linux-x86_64/bin/nvim
  register: nvim_check

- name: Download Neovim archive
  ansible.builtin.get_url:
    url: https://github.com/neovim/neovim/releases/latest/download/nvim-linux-x86_64.tar.gz
    dest: /tmp/nvim-linux-x86_64.tar.gz
    mode: '0644'
  when: not nvim_check.stat.exists

- name: Remove existing nvim directory
  ansible.builtin.file:
    path: /opt/nvim-linux-x86_64
    state: absent
  when: not nvim_check.stat.exists
  become: true

- name: Extract Neovim archive
  ansible.builtin.unarchive:
    src: /tmp/nvim-linux-x86_64.tar.gz
    dest: /opt
    remote_src: yes
  when: not nvim_check.stat.exists
  become: true

- name: Clean up Neovim archive
  ansible.builtin.file:
    path: /tmp/nvim-linux-x86_64.tar.gz
    state: absent
  when: not nvim_check.stat.exists

- name: Create nvim symlink in /usr/local/bin
  ansible.builtin.file:
    src: /opt/nvim-linux-x86_64/bin/nvim
    dest: /usr/local/bin/nvim
    state: link
  become: true
