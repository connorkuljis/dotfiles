---
- name: Check if nvim is installed
  ansible.builtin.stat:
    path: /opt/nvim-linux-x86_64/bin/nvim
  register: nvim_check

- name: Download Neovim archive
  ansible.builtin.get_url:
    url: https://github.com/neovim/neovim/releases/latest/download/nvim-linux-x86_64.tar.gz
    dest: /tmp/nvim-linux-x86_64.tar.gz
    mode: '0644'
  when: not nvim_check.stat.exists

- name: Remove existing nvim directory
  ansible.builtin.file:
    path: /opt/nvim-linux-x86_64
    state: absent
  when: not nvim_check.stat.exists
  become: true

- name: Extract Neovim archive
  ansible.builtin.unarchive:
    src: /tmp/nvim-linux-x86_64.tar.gz
    dest: /opt
    remote_src: yes
  when: not nvim_check.stat.exists
  become: true

- name: Clean up Neovim archive
  ansible.builtin.file:
    path: /tmp/nvim-linux-x86_64.tar.gz
    state: absent
  when: not nvim_check.stat.exists

- name: Create nvim symlink in /usr/local/bin
  ansible.builtin.file:
    src: /opt/nvim-linux-x86_64/bin/nvim
    dest: /usr/local/bin/nvim
    state: link
  become: true
