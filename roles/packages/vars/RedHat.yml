---
# Distro-specific system package list for the RedHat family (Fedora/RHEL).
# Names differ from Debian; lazygit is intentionally omitted here and
# installed via `go install` in the go role (not in Fedora default repos).
packages:
  - make
  - tmux
  - stow
  - rsync
  - curl
  - git
  - '@development-tools'        # build-essential equivalent
  - gdouros-symbolic-fonts      # fonts-font-awesome equivalent
  - google-noto-color-emoji-fonts
  - jq
  - cowsay
