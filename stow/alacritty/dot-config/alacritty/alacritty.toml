[general]
import = ["./themes/dark.toml"]
live_config_reload = true

[window]
decorations = "Full"
opacity = 0.9

[font]
size = 16.0

[font.normal]
family = "DejaVu Sans Mono"
style = "Book"

[font.bold]
family = "DejaVu Sans Mono"
style = "Bold"

[font.italic]
family = "DejaVu Sans Mono"
style = "Oblique"

[font.bold_italic]
family = "DejaVu Sans Mono"
style = "Bold Oblique"

[[keyboard.bindings]]
key = "F11"
action = "ToggleFullscreen"
