- name: Dotfiles setup
  hosts: localhost
  become: true
  tasks:
   - name: Update apt cache
     ansible.builtin.apt:
       update_cache: yes
       cache_valid_time: 3600
     when: ansible_facts["os_family"] == "Debian"

   - name: Ensure required packages are installed
     ansible.builtin.apt:
       name:
        - make
        - tmux
        - stow
       state: present
     when: ansible_facts["os_family"] == "Debian"

   - name: Verify make installation
     ansible.builtin.command:
       cmd: make --version
     register: make_version
     changed_when: false

   - name: Ensure stow directory exists
     ansible.builtin.file:
       path: "{{ playbook_dir }}/stow"
       state: directory
       mode: '0755'

   - name: Stow all packages
     ansible.builtin.shell:
       cmd: |
         cd {{ playbook_dir }}/stow
         for dir in */; do
           stow --verbose "${dir%/}"
         done
     register: stow_result
     changed_when: "'LINK' in stow_result.stdout"
