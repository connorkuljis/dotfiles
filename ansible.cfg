[defaults]
# Parallelism: 4 hosts, give headroom
forks = 10

# Fact caching: only gather once per day instead of every run
gathering = smart
fact_caching = jsonfile
fact_caching_connection = ~/.ansible/facts_cache
fact_caching_timeout = 86400

# Pipelining: pipe modules over SSH stdin instead of SFTP+exec per task
pipelining = true

# Quieter output
deprecation_warnings = false
display_skipped_hosts = false

[ssh_connection]
# Reuse a single SSH connection per host across tasks
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o PreferredAuthentications=publickey
